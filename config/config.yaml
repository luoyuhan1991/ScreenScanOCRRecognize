scan:
  interval_seconds: 3.0
  roi_padding: 10
  enable_roi: true
  saved_roi:
  - 1170
  - 256
  - 1880
  - 843
  remember_roi: true
ocr:
  default_engine: paddle
  languages:
  - ch
  - en
  min_confidence: 0.3
  save_processed_image: true
  easyocr:
    canvas_size: 1920
    mag_ratio: 1.5
    dynamic_params: true
  enable_image_invert: false
  auto_detect_invert: false
gpu:
  auto_detect: false
  force_cpu: false
  force_gpu: true
files:
  output_dir: output
  banlist_file: C:/Users/Administrator/Desktop/banlist.txt
  save_screenshot: true
  save_ocr_result: true
  folder_mode: minute
  max_folders: 10
cleanup:
  enabled: true
  max_age_hours: 1
  interval_minutes: 10
matching:
  enabled: true
  display_duration: 3.0
  position: center
  match_ratio_threshold: 0.75
  font_size: 20
logging:
  level: INFO
  file: logs/app.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  max_bytes: 10485760
  backup_count: 5
performance:
  memory_monitor_interval_ms: 5000
  use_psutil: true
  max_log_queue_size: 1000
  log_queue_cleanup_threshold: 800
  explicit_image_cleanup: true
